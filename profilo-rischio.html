<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilo di Rischio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#0a2540,#1e3c72);
      display:flex;justify-content:center;align-items:center;height:100vh;margin:0;
      color:#333;
    }

    .card {
      background:white;padding:30px;border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);width:380px;
    }

    h2 {text-align:center;margin-bottom:10px;color:#0a2540;}

    label {display:block;margin-top:15px;font-weight:bold;}
    select {width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc;}

    button {
      margin-top:20px;width:100%;padding:10px;background:#0a2540;
      color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;
    }

    .result {margin-top:15px;text-align:center;font-weight:bold;}
    .explain {margin-top:10px;font-size:14px;color:#555;}

    .circle-container {
      width:140px;
      height:140px;
      margin:20px auto 0;
      position:relative;
    }

    .circle-container svg {
      transform:rotate(-90deg);
    }

    .circle-text {
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%, -50%);
      font-size:20px;
      font-weight:bold;
      color:#0a2540;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Profilo di Rischio</h2>

  <label>Tolleranza al rischio</label>
  <select id="tolleranza">
    <option value="">Seleziona</option>
    <option value="2">Alta (forti oscillazioni)</option>
    <option value="3">Media</option>
    <option value="4">Bassa</option>
  </select>

  <label>Capacità di rischio</label>
  <select id="capacita">
    <option value="">Seleziona</option>
    <option value="2">Lungo periodo (>20 anni)</option>
    <option value="3">Medio (10-20 anni)</option>
    <option value="4">Breve (<10 anni)</option>
  </select>

  <label>Necessità di rischio</label>
  <select id="necessita">
    <option value="">Seleziona</option>
    <option value="2">Rendimento elevato</option>
    <option value="3">Medio-alto</option>
    <option value="4">Medio-basso</option>
  </select>

  <label>Rischio complessivo desiderato</label>
  <select id="complessivo">
    <option value="">Seleziona</option>
    <option value="0">Nullo</option>
    <option value="0.3">Poco</option>
    <option value="0.5">Medio</option>
    <option value="0.7">Medio alto</option>
    <option value="0.85">Alto</option>
    <option value="1">Massimo</option>
  </select>

  <button onclick="calcolaMedia()">Calcola</button>

  <div class="result" id="risultato"></div>
  <div class="explain" id="spiegazione"></div>

  <div class="circle-container" id="circleBox" style="display:none;">
    <svg width="140" height="140">
      <circle cx="70" cy="70" r="60" stroke="#e6e6e6" stroke-width="12" fill="none"></circle>
      <circle id="progressCircle" cx="70" cy="70" r="60"
              stroke="#0a2540" stroke-width="12" fill="none"
              stroke-linecap="round"
              stroke-dasharray="377"
              stroke-dashoffset="377"></circle>
    </svg>
    <div class="circle-text" id="circleText">0%</div>
  </div>

</div>

<script>
function calcolaMedia(){
  let t = parseFloat(document.getElementById('tolleranza').value);
  let c = parseFloat(document.getElementById('capacita').value);
  let n = parseFloat(document.getElementById('necessita').value);
  let r = parseFloat(document.getElementById('complessivo').value);

  if(isNaN(t) || isNaN(c) || isNaN(n) || isNaN(r)){
    document.getElementById('risultato').innerText = "Completa tutte le selezioni";
    return;
  }

  let media = (t + c + n + r) / 4;
  let y = Math.round(media);

  let profilo = "";
  let spiegazione = "";

  if(y <= 2){
    profilo = "Basso";
    spiegazione = "Profilo prudente: stabilità e protezione del capitale.";
  } else if(y <= 4){
    profilo = "Medio";
    spiegazione = "Profilo bilanciato: equilibrio tra rischio e rendimento.";
  } else {
    profilo = "Alto";
    spiegazione = "Profilo aggressivo: orientato alla crescita con alta volatilità.";
  }

  // Formula originale × coefficiente finale
  let maxAzioni = (1.33778256608982 / media) * r;

  // Limiti 0–100%
  maxAzioni = Math.min(1, Math.max(0, maxAzioni));

  let percentualeAzioni = (maxAzioni * 100).toFixed(2);

  document.getElementById('risultato').innerHTML =
    `Media: ${media.toFixed(2)} | Y = ${y} (${profilo})<br>
     Max % Azioni: ${percentualeAzioni}%`;

  document.getElementById('spiegazione').innerText = spiegazione;

  aggiornaIndicatore(percentualeAzioni);
}

function aggiornaIndicatore(percentuale){
  const circle = document.getElementById("progressCircle");
  const text = document.getElementById("circleText");
  const box = document.getElementById("circleBox");

  box.style.display = "block";

  const maxDash = 377;
  const targetOffset = maxDash - (maxDash * percentuale / 100);

  let current = 377;
  let step = (current - targetOffset) / 40;

  let anim = setInterval(() => {
    current -= step;
    if(current <= targetOffset){
      current = targetOffset;
      clearInterval(anim);
    }
    circle.style.strokeDashoffset = current;
    text.innerText = percentuale + "%";
  }, 15);
}
</script>

</body>
</html>
